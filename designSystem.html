<!doctype html>
<html lang="fr" id="terraCognita">
	<head>
		<title>Terra Cognita/ Univers 3D</title>
		
		<meta charset="UTF-8">
		<meta name="ROBOTS" content="INDEX,FOLLOW">
		<meta name="keywords" content="terracognita, caroline, moureaux-nery">
		<meta name="viewport" content="initial-scale=1, user-scalable=no">
		<meta property="og:title" content="TerraCognita">
		
		<!-- Cascading Style Sheets -->
		<link rel="stylesheet" type="text/css" href="design-system.css"><!-- Pour tout le monde -->
	</head>
	
	
	<body onload=resize() onresize=resize()>
		<div class="header">
			<img src="IMAGES/LogoTC.png" id="logo"><p id="TerraCognita"><a href="main.html"><b>Terra Cognita</b></a></p>
			<p id="univers3D"> | Univers 3D</p>
			<a href="projet.html"><p id="projet">le projet</p></a>
			<a href="contact.html"><p id="contact">contact</p></a>
		</div>

		<div class="row">
			<div class="column"><img class="img" style="padding-left: 300px" src="IMAGES/DS-01.png"></div>
			<!--<div class="column"><img class="img" src="IMAGES/DS-02.png"></div>-->
			<div class="column"><img class="img" src="IMAGES/DS-04.png"></div>
			<div class="column"><img class="img" src="IMAGES/DS-03.png"></div>
			<div class="column"><img class="img" src="IMAGES/DS-05.png"></div>
			<div class="column"><img class="img" src="IMAGES/DS-06.png"></div>
			<div class="column"><img class="img" src="IMAGES/DS-07.png"></div>
		</div>

		<script>
	    function resize() {
	    	//on récupère la hauteur du viewport et s'en sert pour resizer la hauteur de la ligne d'images
	    	var h = window.innerHeight;
	    	var hLogo = document.getElementById("logo").offsetHeight + 40; //on récupère la hauteur du logo + ses margin-top et bottom 
	    	var img = document.getElementsByClassName("img");

	    	for(i=0; i<6; i++){
	    		img[i].style.height=(h-hLogo-120)+"px"; //on enlève encore 20px vu qu'on a ajouté de la marge en haut et en bas de chaque image (réglé dans .column)
	    	}
	    }
		</script>
		
	</body>
